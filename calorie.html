<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3123996159086312"
     crossorigin="anonymous"></script>
  <title>Calorie Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      margin: 0;
      display: flex;
      justify-content: center;
      padding: 30px 0;
    }

    .container {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 90%;
      max-width: 450px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 22px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      color: #cbd5e1;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: none;
      border-radius: 6px;
      outline: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #16a34a;
    }

    .result {
      margin-top: 20px;
      background: #0f172a;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      line-height: 1.6;
    }

    a {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #93c5fd;
      text-decoration: none;
      font-size: 14px;
    }

    * {
  box-sizing: border-box;
}
  </style>
</head>

<body>

<div class="container">
  <h1>🍎 Calorie Calculator</h1>

  <label>Age</label>
  <input type="number" id="age" placeholder="e.g. 20">

  <label>Gender</label>
  <select id="gender">
    <option value="male">Male</option>
    <option value="female">Female</option>
  </select>

  <label>Weight (kg)</label>
  <input type="number" id="weight" placeholder="e.g. 60">

  <label>Height (cm)</label>
  <input type="number" id="height" placeholder="e.g. 170">

  <label>Activity Level</label>
  <select id="activity">
    <option value="1.2">Sedentary (little/no exercise)</option>
    <option value="1.375">Light exercise (1–3 days/week)</option>
    <option value="1.55">Moderate exercise (3–5 days/week)</option>
    <option value="1.725">Heavy exercise (6–7 days/week)</option>
    <option value="1.9">Athlete (very intense)</option>
  </select>

  <button onclick="calculateCalories()">Calculate</button>

  <div class="result" id="result" style="display:none;"></div>

  <a href="index.html">← Back to Home</a>
</div>

<script>
function calculateCalories() {
  let age = parseFloat(document.getElementById("age").value);
  let gender = document.getElementById("gender").value;
  let weight = parseFloat(document.getElementById("weight").value);
  let height = parseFloat(document.getElementById("height").value);
  let activity = parseFloat(document.getElementById("activity").value);

  if (isNaN(age) || isNaN(weight) || isNaN(height)) {
    alert("Please fill in all fields correctly.");
    return;
  }

  // Mifflin-St Jeor Equation
  let bmr;

  if (gender === "male") {
    bmr = (10 * weight) + (6.25 * height) - (5 * age) + 5;
  } else {
    bmr = (10 * weight) + (6.25 * height) - (5 * age) - 161;
  }

  let tdee = bmr * activity;

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML = `
    <strong>BMR:</strong> ${bmr.toFixed(0)} kcal/day<br>
    <strong>Daily Calories (TDEE):</strong> ${tdee.toFixed(0)} kcal/day
  `;
}
</script>

</body>
</html>
