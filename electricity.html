<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electricity Bill Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 22px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: none;
      border-radius: 6px;
      outline: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #f59e0b;
      border: none;
      border-radius: 6px;
      color: #0f172a;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #d97706;
    }

    .result {
      margin-top: 20px;
      background: #0f172a;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      line-height: 1.6;
    }

    a {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #93c5fd;
      text-decoration: none;
      font-size: 14px;
    }

    * {
  box-sizing: border-box;
}
  </style>
</head>

<body>

<div class="container">
  <h1>⚡ Electricity Bill Calculator</h1>

  <label>Power Consumption (kWh)</label>
  <input type="number" id="kwh" placeholder="e.g. 100">

  <label>Rate per kWh (₱)</label>
  <input type="number" id="rate" placeholder="e.g. 12">

  <label>Fixed Monthly Charge (₱)</label>
  <input type="number" id="fixed" placeholder="e.g. 50">

  <button onclick="calculateBill()">Calculate</button>

  <div class="result" id="result" style="display:none;"></div>

  <a href="index.html">← Back to Home</a>
</div>

<script>
function calculateBill() {
  let kwh = parseFloat(document.getElementById("kwh").value);
  let rate = parseFloat(document.getElementById("rate").value);
  let fixed = parseFloat(document.getElementById("fixed").value);

  if (isNaN(kwh) || isNaN(rate) || isNaN(fixed)) {
    alert("Please enter valid values.");
    return;
  }

  let energyCost = kwh * rate;
  let totalBill = energyCost + fixed;

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML = `
    <strong>Energy Cost:</strong> ₱${energyCost.toFixed(2)}<br>
    <strong>Fixed Charge:</strong> ₱${fixed.toFixed(2)}<br>
    <strong>Total Bill:</strong> ₱${totalBill.toFixed(2)}
  `;
}
</script>

</body>
</html>
