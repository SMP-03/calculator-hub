<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salary Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 22px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: none;
      border-radius: 6px;
      outline: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #16a34a;
    }

    .result {
      margin-top: 20px;
      background: #0f172a;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      line-height: 1.7;
    }

    a {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #93c5fd;
      text-decoration: none;
      font-size: 14px;
    }
    * {
  box-sizing: border-box;
}
  </style>
</head>

<body>

<div class="container">
  <h1>💼 Salary / Tax Calculator</h1>

  <label>Gross Monthly Salary</label>
  <input type="number" id="salary" placeholder="e.g. 30000">

  <label>Tax Rate (%)</label>
  <input type="number" id="tax" placeholder="e.g. 10">

  <label>Other Deductions (%)</label>
  <input type="number" id="deductions" placeholder="e.g. 5">

  <button onclick="calculateSalary()">Calculate</button>

  <div class="result" id="result" style="display:none;"></div>

  <a href="index.html">← Back to Home</a>
</div>

<script>
function calculateSalary() {
  let salary = parseFloat(document.getElementById("salary").value);
  let tax = parseFloat(document.getElementById("tax").value);
  let deductions = parseFloat(document.getElementById("deductions").value);

  if (isNaN(salary) || isNaN(tax) || isNaN(deductions)) {
    alert("Please enter valid values.");
    return;
  }

  let taxAmount = (salary * tax) / 100;
  let deductionAmount = (salary * deductions) / 100;
  let netSalary = salary - taxAmount - deductionAmount;

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML = `
    <strong>Gross Salary:</strong> ₱${salary.toFixed(2)}<br>
    <strong>Tax:</strong> ₱${taxAmount.toFixed(2)}<br>
    <strong>Deductions:</strong> ₱${deductionAmount.toFixed(2)}<br>
    <strong>Net Salary:</strong> ₱${netSalary.toFixed(2)}
  `;
}
</script>

</body>
</html>
